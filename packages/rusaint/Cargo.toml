[package]
name = "rusaint"
description = "Easy-to-use SSU u-saint client"
categories = ["web-programming"]

version.workspace = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
readme.workspace = true

[features]
default = ["application", "element", "rustls"]
element = []
application = ["element"]
stream = ["dep:async-stream", "dep:futures-core"]
uniffi = ["dep:uniffi", "application"]
rustls = ["reqwest/rustls"]
rustls-no-provider = [
    "dep:ring",
    "dep:rustls",
    "wdpe/reqwest-rustls-no-provider",
    "ozra/client-rustls-no-provider",
]

[dependencies]
uniffi = { workspace = true, optional = true }
derive_builder = "0.20.2"
reqwest = { version = "0.13.2", default-features = false, features = [
    "charset",
    "http2",
    "cookies",
    "gzip",
    "brotli",
] }
ring = { version = "0.17", optional = true }
rustls = { version = "0.23", default-features = false, optional = true, features = [
    "ring",
    "logging",
    "std",
    "tls12",
] }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
html-escape = "0.2.13"
url = "2.5.4"
roxmltree = "0.21.0"
lol_html = "2.3.0"
serde = { version = "1", features = ["derive"] }
custom_debug_derive = "0.6.2"
regex-lite = "0.1.6"
serde_json = "1.0.140"
reqwest_cookie_store = { version = "0.10.0", features = ["serde"] }
cookie_store = "0.22"
tracing = "0.1.41"
wdpe = { version = "0.4.3", features = ["reqwest"] }
ozra = { version = "0.0.4" }
async-stream = { version = "0.3", optional = true }
futures-core = { version = "0.3", optional = true }

[dev-dependencies]
anyhow = "1"
dotenvy = "0.15.7"
futures = "0.3.31"
tokio-test = "0.4.4"
tokio = { workspace = true, features = ["macros", "test-util"] }
lazy_static = "1.5.0"
tracing-test = "0.2.5"

[build-dependencies]
uniffi = { workspace = true, features = ["build"] }
