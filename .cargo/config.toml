[env]
# React Native 0.79.2 requires iOS 15.1+.
# Without this, Rust's aarch64-apple-ios target defaults to iOS 10.0,
# causing aws-lc-sys to emit ___chkstk_darwin calls (macOS-only stack probe)
# that don't exist in the iOS SDK.
IPHONEOS_DEPLOYMENT_TARGET = "15.1"

[target.aarch64-linux-android]
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384", "-C", "link-arg=-Wl,-z,common-page-size=16384"]

[target.armv7-linux-androideabi]
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384", "-C", "link-arg=-Wl,-z,common-page-size=16384"]

[target.i686-linux-android]
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384", "-C", "link-arg=-Wl,-z,common-page-size=16384"]

[target.x86_64-linux-android]
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384", "-C", "link-arg=-Wl,-z,common-page-size=16384"]
